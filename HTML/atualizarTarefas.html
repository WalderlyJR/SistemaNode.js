<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atualizar Tarefa</title>
    <link rel="stylesheet" href="../CSS/style.css">
</head>
<body>
     <header>
        <h1>Editar Tarefa</h1>
    </header>
    
    <div class="formu">
<form action="" id="form" method="post">
        <div class="input-container">
            <label for="id">ID da Tarefa:</label>
            <input type="number" id="id" name="id" required>
        </div>
        <div class="input-container">
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" required>
        </div>
        <div class="input-container">
            <label for="descricao">Descrição:</label>
            <input type="text" id="descricao" name="descricao" required>
        </div>

        <div class="input-container">
            <label for="setor">Setor:</label>
            <input type="text" id="setor" name="setor" required></input>
        </div>

        <div class="input-container">
            <label for="Usuario">Usuário</label>
            <select name="usuario" id="usuario">
                <option value="">Selecione um usuário</option>
            </select>
        </div>
        <div class="input-container">
            <label for="prioridades">Prioridades:</label>
            <select name="prioridades" id="prioridades">
                <option value="alta">Alta</option>
                <option value="media">Média</option>
                <option value="baixa">Baixa</option>
            </select>
        </div>
         <div class="input-container">
            <label for="status">Status:</label>
            <select name="status" id="status">
                <option value="a fazer">a fazer</option>
                <option value="em andamento">em andamento</option>
                <option value="ja feito">ja feito</option>
            </select>
        </div>


        <button type="submit">Editar Tarefa</button>
    </div>
    </form>
    
    <script src="../JS/atualizarTarefas.js"></script>

</body>
</html>
